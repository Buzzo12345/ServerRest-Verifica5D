<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette</title>
</head>
<body>
    <h1>Roulette</h1>
    <p>Benvenuto alla roulette! Scegli La tua Giocata!</p>
    <form id="rouletteForm">
        <label for="giocata">Scegli:</label>
        <select id="giocata" name="giocata">
            <option value="pari">Pari</option>
            <option value="dispari">Dispari</option>
        </select>
        <button type="submit">Gira la roulette</button>
    </form>
    <p id="result"></p>

</html>
