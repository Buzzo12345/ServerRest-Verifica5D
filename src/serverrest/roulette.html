<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette</title>
</head>
<body>
    <h1>Roulette</h1>
    <p>Benvenuto alla roulette! Scegli La tua Giocata!</p>
    <form id="rouletteForm">
        <label for="giocata">Scegli:</label>
        <select id="giocata" name="giocata">
            <option value="pari">Pari</option>
            <option value="dispari">Dispari</option>
        </select>
        <button type="submit">Gira la roulette</button>
    </form>
    <p id="result"></p>

    <script>
        async function calcolaPost(){
            const giocata = document.getElementById('giocata').value;
            const requestData = {
                giocata: giocata,
                numero: null
            };

            try {
                const response = await fetch('http://localhost:8080/api/roulette/paridispari/post', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });

                if (!response.ok) {
                    throw new Error('Errore nella richiesta POST');
                }

                const responseData = await response.json();
                document.getElementById('result').textContent = `Risultato: ${responseData.risultato}`;
            } catch (error) {
                console.error('Errore:', error);
                document.getElementById('result').textContent = 'Si è verificato un errore.';
            }
        }

        async function calcolaGet(){
            try {
                const response = await fetch('http://localhost:8080/api/roulette/paridispari/get', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error('Errore nella richiesta GET');
                }

                const responseData = await response.json();
                document.getElementById('result').textContent = `Risultato: ${responseData.risultato}`;
            } catch (error) {
                console.error('Errore:', error);
                document.getElementById('result').textContent = 'Si è verificato un errore.';
            }
        }
    </script>

</html>
