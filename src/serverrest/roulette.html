<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette</title>
</head>
<body>
    <h1>Roulette</h1>
    <p>Benvenuto alla roulette! Scegli un numero da 0 a 36 e prova a vincere!</p>
    <form id="rouletteForm">
        <label for="number">Scegli un numero:</label>
        <input type="number" id="number" name="number" min="1" max="36" required>
        <button type="submit">Gira la ruota</button>
    </form>
    <p id="result"></p>

</html>
